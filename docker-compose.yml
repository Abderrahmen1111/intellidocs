services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn intellidocs_project.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - ./backend:/app
      - staticfiles:/app/staticfiles
    ports:
      - "8000:8000"
    environment:
      SQL_DATABASE: ${SQL_DATABASE:-postgres}
      SQL_USER: ${SQL_USER:-postgres}
      SQL_PASSWORD: ${DB_PASSWORD}
      SQL_HOST: ${SQL_HOST}
      SQL_PORT: ${SQL_PORT:-5432}
      SQL_SSL_MODE: ${SQL_SSL_MODE:-require}
      SECRET_KEY: ${SECRET_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-70b-versatile}
      DEBUG: ${DEBUG:-False}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - staticfiles:/app/staticfiles:ro
    depends_on:
      - backend
      - frontend

volumes:
  staticfiles:
