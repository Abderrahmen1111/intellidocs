name: CI/CD IntelliDocs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 : Tests & Lint Backend Django
  # ─────────────────────────────────────────────
  backend-test:
    name: Backend — Tests & Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: intellidocs_test
          POSTGRES_USER: user
          POSTGRES_PASSWORD: testpassword
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      SQL_DATABASE: intellidocs_test
      SQL_USER: user
      SQL_PASSWORD: testpassword
      SQL_HOST: localhost
      SQL_PORT: 5432
      SQL_SSL_MODE: disable
      SECRET_KEY: ci-test-secret-key-not-for-production
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      DEBUG: "True"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"  # ⚡ Cache des dépendances pip

      - name: Installer les dépendances
        run: pip install -r backend/requirements.txt

      - name: Linting (flake8)
        run: |
          pip install flake8
          flake8 backend/ --max-line-length=120 --exclude=backend/*/migrations/

      - name: Exécuter les migrations
        working-directory: backend
        run: python manage.py migrate

      - name: Exécuter les tests
        working-directory: backend
        run: python manage.py test

  # ─────────────────────────────────────────────
  # JOB 2 : Tests & Build Frontend Next.js
  # ─────────────────────────────────────────────
  frontend-test:
    name: Frontend — Tests & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dépendances
        working-directory: frontend
        run: npm ci

      - name: Lint (ESLint)
        working-directory: frontend
        run: npm run lint

      - name: Build Next.js
        working-directory: frontend
        run: npm run build

  # ─────────────────────────────────────────────
  # JOB 3 : Build & Push image Docker (main seulement)
  # ─────────────────────────────────────────────
  docker-build:
    name: Docker — Build & Push
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image Docker backend
        run: docker build -t intellidocs-backend:latest -f Dockerfile.backend .

      - name: Scanner l'image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: intellidocs-backend:latest
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Connexion au registre GitHub (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag et Push vers GHCR
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/intellidocs-backend
          docker tag intellidocs-backend:latest $IMAGE:${{ github.sha }}
          docker tag intellidocs-backend:latest $IMAGE:latest
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

  # ─────────────────────────────────────────────
  # JOB 4 : Déploiement Production
  # ─────────────────────────────────────────────
  deploy:
    name: Déploiement — Production
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    environment: production  # Requiert une approbation manuelle si configuré

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Déployer via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/intellidocs
            git pull origin main
            docker-compose down
            docker-compose pull backend
            docker-compose up -d --build
            docker system prune -f
            echo "✅ Déploiement IntelliDocs terminé : $(date)"
